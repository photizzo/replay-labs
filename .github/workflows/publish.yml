name: publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi
      - run: npm test
      - name: Packed package smoke
        run: |
          npm pack --pack-destination "$RUNNER_TEMP"
          npm install -g "$RUNNER_TEMP"/replay-labs-*.tgz
          replay-labs --help
          replay --help
          REPLAY_HOME="$RUNNER_TEMP/replay-home" replay-labs --no-open --port 0 > "$RUNNER_TEMP/replay.log" 2>&1 &
          PID=$!
          for i in {1..30}; do
            URL="$(grep -o 'http://127.0.0.1:[0-9]*/' "$RUNNER_TEMP/replay.log" | head -1 || true)"
            if [ -n "$URL" ] && curl -fsS "${URL}api/health"; then
              kill "$PID"
              wait "$PID" || true
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/replay.log"
          kill "$PID" || true
          exit 1
      - run: npm publish
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Published replay-labs@$VERSION to npm with provenance."
